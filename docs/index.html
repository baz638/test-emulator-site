<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>To‑Do + Emulator Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>To‑Do List (stored locally)</h1>
    <p>Tasks are saved in your browser using localStorage.</p>
  </header>

  <main>
    <section id="todo-section" class="card">
      <form id="todo-form" autocomplete="off">
        <input id="new-task" type="text" placeholder="Add a new task..." required />
        <button id="add-btn" type="submit">Add</button>
      </form>

      <div id="counts" class="counts"></div>

      <ul id="tasks" class="task-list" aria-live="polite"></ul>

      <div class="controls">
        <button id="clear-completed">Clear completed</button>
        <button id="clear-all">Clear all</button>
      </div>
    </section>

    <section id="v86-section" class="card">
      <h2>v86 Emulator (coming next)</h2>
      <p>When you're ready we'll add v86 assets and a tiny test image so you can run an in-browser emulator.</p>
      <div id="v86-container"></div>
      <button id="start-v86">Start Emulator</button>
      <button id="stop-v86">Stop Emulator</button>
    </section>
  </main>

  <footer>
    <small>Saved in localStorage under key <code>my-tasks</code>. Works offline in the same browser.</small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
