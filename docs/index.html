<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Cloud Emulator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="main-container">
        <h1>Android Cloud Gaming</h1>
        <div id="emulator-window">
            <div id="display-area">
                <div id="placeholder-text">
                    <p>Emulator Offline</p>
                    <p>Click "Start Emulator" to boot Android</p>
                </div>
            </div>
            <button id="fullscreen-btn">⛶ Fullscreen</button>
        </div>
        <div id="controls">
            <button id="start-btn">Start Emulator</button>
            <div class="sliders">
                <div class="slider-group">
                    <label>Volume</label>
                    <input type="range" id="vol-slider" min="0" max="100" value="80">
                </div>
                <div class="slider-group">
                    <label>Quality</label>
                    <input type="range" id="quality-slider" min="360" max="1080" step="360" value="720">
                </div>
                <div class="slider-group">
                    <label>Target FPS</label>
                    <input type="range" id="fps-slider" min="30" max="60" step="30" value="60">
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
